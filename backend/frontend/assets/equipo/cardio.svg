<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#888" stroke="#888"
     stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Cardio">
  <!-- Cabeza (inclinada hacia adelante) -->
  <circle cx="15" cy="3.5" r="2.5" stroke="none"/>
  <!-- Torso inclinado -->
  <line x1="14" y1="6"  x2="11" y2="14" stroke-width="1.9"/>
  <!-- Brazo delantero -->
  <line x1="13" y1="8.5" x2="18.5" y2="10.5" stroke-width="1.9"/>
  <!-- Brazo trasero -->
  <line x1="13" y1="9"   x2="8.5"  y2="7.5"  stroke-width="1.9"/>
  <!-- Pierna delantera (zancada) -->
  <line x1="11" y1="14" x2="16.5" y2="18"  stroke-width="1.9"/>
  <line x1="16.5" y1="18" x2="19" y2="22"  stroke-width="1.9"/>
  <!-- Pierna trasera (empuje) -->
  <line x1="11" y1="14" x2="8"   y2="19"  stroke-width="1.9"/>
  <line x1="8"  y1="19" x2="5.5" y2="22"  stroke-width="1.9"/>
</svg>
