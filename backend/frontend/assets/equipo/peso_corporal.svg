<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#888" stroke="#888"
     stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Peso corporal">
  <!-- Cabeza -->
  <circle cx="12" cy="3.5" r="2.5" stroke="none"/>
  <!-- Torso -->
  <line x1="12" y1="6"  x2="12" y2="14" stroke-width="1.9"/>
  <!-- Brazo izquierdo (hacia abajo) -->
  <line x1="12" y1="9"  x2="7"  y2="13" stroke-width="1.9"/>
  <!-- Brazo derecho -->
  <line x1="12" y1="9"  x2="17" y2="13" stroke-width="1.9"/>
  <!-- Pierna izquierda -->
  <line x1="12" y1="14" x2="8.5" y2="21" stroke-width="1.9"/>
  <!-- Pierna derecha -->
  <line x1="12" y1="14" x2="15.5" y2="21" stroke-width="1.9"/>
</svg>
