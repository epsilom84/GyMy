<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 214" role="img" aria-label="Grupos musculares">
  <!-- ======== FRENTE ======== -->
  <!-- Cabeza -->
  <circle cx="30" cy="14" r="10" fill="#bdbdbd" stroke="#9e9e9e" stroke-width=".6"/>
  <rect x="26.5" y="23" width="7" height="6" fill="#bdbdbd" rx="2"/>
  <!-- Hombros frontales (Hombros) -->
  <ellipse cx="15" cy="38" rx="10" ry="7" fill="#ab47bc"/>
  <ellipse cx="45" cy="38" rx="10" ry="7" fill="#ab47bc"/>
  <!-- Pecho -->
  <path d="M20,30 Q30,26 40,30 L41,55 Q30,58 19,55 Z" fill="#ef5350"/>
  <!-- Core / Abdomen -->
  <path d="M19,56 Q30,59 41,56 L40,82 Q30,85 20,82 Z" fill="#26c6da"/>
  <!-- Bíceps + Antebrazos (Brazos) -->
  <rect x="5" y="36" width="10" height="27" fill="#ffa726" rx="4"/>
  <rect x="45" y="36" width="10" height="27" fill="#ffa726" rx="4"/>
  <rect x="5" y="65" width="8" height="20" fill="#ffa726" rx="3.5"/>
  <rect x="47" y="65" width="8" height="20" fill="#ffa726" rx="3.5"/>
  <!-- Caderas (neutro) -->
  <path d="M20,83 Q30,86 40,83 L41,96 Q30,99 19,96 Z" fill="#9e9e9e"/>
  <!-- Cuádriceps + Gemelos (Piernas) -->
  <rect x="19" y="96" width="10" height="36" fill="#66bb6a" rx="4.5"/>
  <rect x="31" y="96" width="10" height="36" fill="#66bb6a" rx="4.5"/>
  <rect x="20" y="134" width="8.5" height="26" fill="#81c784" rx="4"/>
  <rect x="31" y="134" width="8.5" height="26" fill="#81c784" rx="4"/>

  <!-- ======== SEPARADOR ======== -->
  <line x1="60" y1="4" x2="60" y2="166" stroke="#616161" stroke-width=".5" stroke-dasharray="3,2"/>

  <!-- ======== ESPALDA ======== -->
  <!-- Cabeza -->
  <circle cx="90" cy="14" r="10" fill="#bdbdbd" stroke="#9e9e9e" stroke-width=".6"/>
  <rect x="86.5" y="23" width="7" height="6" fill="#bdbdbd" rx="2"/>
  <!-- Deltoides traseros (Hombros) -->
  <ellipse cx="75" cy="38" rx="10" ry="7" fill="#ab47bc"/>
  <ellipse cx="105" cy="38" rx="10" ry="7" fill="#ab47bc"/>
  <!-- Espalda completa (dorsales + trapecio + lumbar) -->
  <path d="M80,30 Q90,26 100,30 L101,82 Q90,85 79,82 Z" fill="#42a5f5"/>
  <!-- Tríceps + Antebrazos (Brazos) -->
  <rect x="65" y="36" width="10" height="27" fill="#ffa726" rx="4"/>
  <rect x="105" y="36" width="10" height="27" fill="#ffa726" rx="4"/>
  <rect x="65" y="65" width="8" height="20" fill="#ffa726" rx="3.5"/>
  <rect x="107" y="65" width="8" height="20" fill="#ffa726" rx="3.5"/>
  <!-- Glúteos + Isquios + Gemelos (Piernas) -->
  <path d="M80,83 Q90,86 100,83 L101,96 Q90,99 79,96 Z" fill="#66bb6a"/>
  <rect x="79" y="96" width="10" height="36" fill="#66bb6a" rx="4.5"/>
  <rect x="91" y="96" width="10" height="36" fill="#66bb6a" rx="4.5"/>
  <rect x="80" y="134" width="8.5" height="26" fill="#81c784" rx="4"/>
  <rect x="91" y="134" width="8.5" height="26" fill="#81c784" rx="4"/>

  <!-- ======== ETIQUETAS VISTAS ======== -->
  <text x="30" y="172" text-anchor="middle" fill="#9e9e9e" font-size="5.5" font-family="sans-serif" letter-spacing=".5">FRENTE</text>
  <text x="90" y="172" text-anchor="middle" fill="#9e9e9e" font-size="5.5" font-family="sans-serif" letter-spacing=".5">ESPALDA</text>

  <!-- ======== LEYENDA ======== -->
  <!-- Fila 1 -->
  <circle cx="6"  cy="183" r="3.5" fill="#ef5350"/>
  <text x="12"  y="186" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Pecho</text>
  <circle cx="38" cy="183" r="3.5" fill="#42a5f5"/>
  <text x="44"  y="186" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Espalda</text>
  <circle cx="76" cy="183" r="3.5" fill="#66bb6a"/>
  <text x="82"  y="186" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Piernas</text>
  <!-- Fila 2 -->
  <circle cx="6"  cy="197" r="3.5" fill="#ab47bc"/>
  <text x="12"  y="200" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Hombros</text>
  <circle cx="46" cy="197" r="3.5" fill="#ffa726"/>
  <text x="52"  y="200" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Brazos</text>
  <circle cx="76" cy="197" r="3.5" fill="#26c6da"/>
  <text x="82"  y="200" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Core</text>
  <!-- Fila 3 (Cardio ocupa fila propia) -->
  <circle cx="6"  cy="211" r="3.5" fill="#ec407a"/>
  <text x="12"  y="214" fill="#bdbdbd" font-size="5.8" font-family="sans-serif">Cardio</text>
</svg>
